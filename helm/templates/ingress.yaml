{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                # Si es la API, usamos el nombre generado por Helm. 
                # Si no, usamos el nombre manual que pusimos en values.yaml.
                name: {{ if .isApi }}{{ $.Release.Name }}-service{{ else }}{{ .serviceName }}{{ end }}
                port:
                  number: {{ if .isApi }}{{ $.Values.service.port }}{{ else }}{{ .servicePort }}{{ end }}
          {{- end }}
    {{- end }}
{{- end }}